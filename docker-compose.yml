version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - MONGO_URI=mongodb://host.docker.internal:27017/creators-hub
      - JWT_SECRET=${JWT_SECRET}
      - facebookAppSecret=${facebookAppSecret}
      - PORT=5000

  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
